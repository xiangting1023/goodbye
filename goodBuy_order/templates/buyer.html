{% load static %}
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>買方管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'css/sellerbuyer.css' %}">
  {% include 'common/header.html' %}
</head>
<body>
  <div class="container">
    <div class="action-buttons mb-4">
      <button class="action-btn" onclick="showTab('border')">待下單</button>
      <button class="action-btn" onclick="showTab('bpayment')">待付款</button>
      <button class="action-btn" onclick="showTab('bshipping')">待收貨</button>
    </div>
    <div id="buyer-content">
      {{ btabs_order|safe }}
    </div>

    <div id="tabs-border" style="display:none;">{{ btabs_order|safe }}</div>
    <div id="tabs-bpayment" style="display:none;">{{ btabs_payment|safe }}</div>
    <div id="tabs-bshipping" style="display:none;">{{ btabs_shipping|safe }}</div>

  <script src="{% static 'js/buyer.js' %}"></script>
</body>
</html>
