{% load static %}

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>訂單完成</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'css/checkout/step3.css' %}">
</head>
<body data-checkout-step="2">

  {% include 'common/header.html' %}
  {% include 'checkout/MoreSteps.html' %}

  <div class="container checkout-complete-container">
    <div class="checkout-complete-box text-center">
      <img src="{% static 'img/oksure.png' %}" alt="完成圖示" class="complete-icon">
      <h2 class="mt-3">訂單已完成</h2>
      {% if shop %}
        {% if shop.purchase_priority_id == 2 or shop.purchase_priority_id == 3 %}
          <p class="mt-2">
            此賣場採多帶優先規則，一個不注意就可能超單唷！
            <br>
            <a href="{% url 'priority_table' shop.id %}" class="text-info fw-bold">(點此 查看目前順序)</a>
          </p>
        {% endif %}
      {% endif %}

      <div class="mt-4 d-flex justify-content-center gap-3">
        <a href="{% url 'home' %}" class="btn-cancel">回首頁</a>
        <a href="{% url 'cart' %}" class="btn-confirm">繼續下單</a>
      </div>
    </div>
  </div>

</body>
</html>
