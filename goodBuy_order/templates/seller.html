{% load static %}
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賣方管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'css/sellerbuyer.css' %}">
  {% include 'common/header.html' %}
</head>
<body>
  <div class="container">
    <div class="action-buttons mb-4">
      <button class="action-btn" onclick="showTab('order')">接單請求</button>
      <button class="action-btn" onclick="showTab('payment')">付款確認</button>
      <button class="action-btn" onclick="showTab('shipping')">待出貨 </button>
    </div>
    <div id="seller-content">
      {{ tab_order|safe }}
    </div>
  </div>

    <div id="tab-order">
    {% include 'tabs/order.html' %}
    </div>
    <div id="tab-payment" style="display:none;">
        {% include 'tabs/payment.html' %}
    </div>
    <div id="tab-shipping" style="display:none;">
        {% include 'tabs/shipping.html' %}
    </div>

  <script src="{% static 'js/seller.js' %}"></script>
</body>
</html>
