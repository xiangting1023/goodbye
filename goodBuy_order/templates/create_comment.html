{% load static %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>對賣家評論</title>
  <link rel="stylesheet" href="{% static 'css/create_comment.css' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="header">{% include 'base.html' %}</div>

  <div class="container mt-4 comment-container">
      <h2>關於這筆訂單，您有甚麼想告訴賣家的嗎?</h2>

      <form method="post" class="comment-form">
          {% csrf_token %}
          {{ form.as_p }}

          <div class="button-group">
              <a href="{% url 'order_detail' order.id %}" class="btn btn-secondary">取消</a>
              <button type="submit" class="btn btn-primary">送出評論</button>
          </div>
      </form>
  </div>
</body>
</html>
