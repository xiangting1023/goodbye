{% load static %}
{% load want_extra %}
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>請選擇你想分享的賣場</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/card.css' %}">
  <link rel="stylesheet" href="{% static 'css/want_select.css' %}">
</head>

<body>
  <div class="container my-4">
    <div class="d-flex align-items-center mb-3">
      
      <h4 class="mb-0 fw-bold">請選擇你想分享的賣場：</h4>
    </div>

    {% include "base.html" %}

    <!-- 如需全域訊息 -->
    {# {% include "common/messages.html" with tag="want" %} #}

    <form method="post" id="reply-form">
      {% csrf_token %}
      <div class="row g-3">
        {% for option in form.shop.field.queryset %}
          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <label class="w-100 card-selectable">
              <input type="radio" name="{{ form.shop.html_name }}" value="{{ option.id }}" class="d-none" data-shop-radio>
              {% include "common/card_item.html" with type="sell" shop=option %}
              <div class="picked-tip">✔ 已選擇</div>
            </label>
          </div>
        {% empty %}
          <p class="text-muted">目前沒有可分享的賣場（可能都已結束或沒有公開/私人可見）。</p>
        {% endfor %}
      </div>
<!-- 
      {% if form.shop.errors %}
        <div class="text-danger small mt-2">{{ form.shop.errors.0 }}</div>
      {% endif %} -->

      <div class="button-group text-end mt-3">
        <a href="{% url 'want_detail' want_id=want.id %}" class="btn btn-outline-secondary me-3">返回該收物帖</a>
        <button type="submit" class="btn btn-primary">確認</button>
      </div>
    </form>
  </div>

  <script src="{% static 'js/pick.js' %}"></script>
</body>
</html>
