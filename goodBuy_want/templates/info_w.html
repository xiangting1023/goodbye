{% load static %}
<link rel="stylesheet" href="{% static 'css/info_s.css' %}">

<div class="card p-3 mb-3">
  <div class="row align-items-center text-center">

    <!-- div 1 頭像 + 名字 -->
    <div class="col-6 col-md-3 d-flex align-items-center justify-content-center mb-2 mb-md-0">
      <a href="{% url 'view_profile' want.user.id %}" class="seller-link d-flex align-items-center">
        <img src="{{ want.user.profile.avatar_url }}" class="avatar me-2" alt="賣家頭像">
        <strong>{{ want.user.username }}</strong>
      </a>
    </div>

    <!-- div 2 註冊時間 -->
    <div class="col-6 col-md-3 mb-2 mb-md-0">
      <p class="text-muted mb-0 small">
        加入時間：{{ want.user.date_joined|date:"Y/m/d" }}
      </p>
    </div>

    <!-- div 3 信譽度 -->
    <div class="col-6 col-md-3 mb-2 mb-md-0">
      <span>
        <i class="fa-regular fa-thumbs-up"></i>
        信譽度：<b class="value">
          {% if average_rank %}{{ average_rank }}{% else %}無評價{% endif %}
        </b>
      </span>
    </div>

    <!-- div 4 粉絲數 -->
    <div class="col-6 col-md-3">
      <span>
        <i class="fa-regular fa-user"></i>
        粉絲數：<b class="value">{{ fans_count|default:0 }}</b>
      </span>
    </div>

  </div>
</div>
